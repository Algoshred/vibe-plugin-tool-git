<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Git</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fafafa;
        --fg: #111;
        --muted: #555;
        --border: #e3e6ed;
      }
      :root[data-vibe-theme="dark"] {
        --bg: #0a0c12;
        --fg: #f4f5f8;
        --muted: #c1c6d2;
        --border: #2c3142;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      body {
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }
      p {
        color: var(--muted);
        margin: 0 0 8px;
      }
      .card {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        margin-top: 12px;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }
      pre {
        margin: 0;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Git</h1>
    <p>
      Per-Vibe Git metadata (branch / status / remote). This iframe replaces the
      inline Git tab once the <code>vibes.tabs.git-iframe</code> feature flag is
      on.
    </p>
    <div class="card" id="git-info" hidden>
      <p><strong>Vibe:</strong> <code id="vibe-id"></code></p>
      <p><strong>Branch:</strong> <code id="branch">—</code></p>
      <p><strong>Status:</strong> <code id="status">—</code></p>
      <p><strong>Remote:</strong> <code id="remote">—</code></p>
    </div>
    <script type="module">
      const ENVELOPE_VERSION = 1;
      // Origin allowlist for postMessage handshake. Hosts that embed this
      // plugin UI inside an iframe must match one of these patterns. To extend
      // with additional hosts, set VIBE_UI_ALLOWED_ORIGINS at the agent
      // (comma-separated host or *.suffix entries) and the agent will
      // template them into this allowlist at install time.
      function isAllowed(origin) {
        try {
          const u = new URL(origin);
          if (u.hostname === "localhost" || u.hostname === "127.0.0.1") return true;
          if (u.hostname === "vibecontrols.com") return true;
          if (u.hostname.endsWith(".vibecontrols.com")) return true;
          const extra = (globalThis.__VIBE_UI_EXTRA_HOSTS__ || []);
          for (const h of extra) {
            if (h.startsWith("*.")) {
              if (u.hostname.endsWith(h.slice(1))) return true;
            } else if (u.hostname === h) {
              return true;
            }
          }
          return false;
        } catch {
          return false;
        }
      }
      function send(kind, payload, requestId) {
        const env = { v: ENVELOPE_VERSION, source: "plugin", kind, payload };
        if (requestId) env.requestId = requestId;
        window.parent?.postMessage(env, "*");
      }
      function rpc(method, args) {
        return new Promise((resolve, reject) => {
          const requestId =
            "r-" +
            Date.now().toString(36) +
            "-" +
            Math.random().toString(36).slice(2, 6);
          const off = (event) => {
            if (!isAllowed(event.origin)) return;
            const d = event.data;
            if (!d || d.v !== ENVELOPE_VERSION || d.source !== "host") return;
            if (d.kind === "host:rpc-response" && d.requestId === requestId) {
              window.removeEventListener("message", off);
              if (d.payload?.ok) resolve(d.payload.result);
              else reject(new Error(d.payload?.error?.message ?? "rpc failed"));
            }
          };
          window.addEventListener("message", off);
          send(
            "plugin:rpc-request",
            { method, args, streaming: false },
            requestId,
          );
          setTimeout(() => {
            window.removeEventListener("message", off);
            reject(new Error("rpc timeout"));
          }, 8000);
        });
      }
      window.addEventListener("message", async (event) => {
        if (!isAllowed(event.origin)) return;
        const d = event.data;
        if (!d || d.v !== ENVELOPE_VERSION || d.source !== "host") return;
        if (d.kind === "host:init") {
          const init = d.payload ?? {};
          const vibeId = init.context?.vibeId;
          if (vibeId) document.getElementById("vibe-id").textContent = vibeId;
          document.getElementById("git-info").hidden = false;
          if (init.theme?.colorMode === "dark") {
            document.documentElement.setAttribute("data-vibe-theme", "dark");
          }
          // Best-effort: ask the host for the cached Vibe so we can show
          // branch / status / remote without an extra fetch.
          try {
            const vibe = await rpc("getContext", { include: ["vibe"] });
            if (vibe?.gitBranch)
              document.getElementById("branch").textContent = vibe.gitBranch;
            if (vibe?.gitStatus)
              document.getElementById("status").textContent = vibe.gitStatus;
            if (vibe?.gitRemote)
              document.getElementById("remote").textContent = vibe.gitRemote;
          } catch (err) {
            // RPC not implemented yet — leave the dashes in place.
          }
        }
      });
      send("plugin:ready", {
        pluginId: "ungit-git",
        pluginVersion: "2026.521.1",
        sdkVersion: "1",
        declaredCapabilities: {
          restPaths: ["/ui/ungit"],
          wsTopics: [],
          rpcMethods: ["getContext"],
        },
      });
    </script>
  </body>
</html>
